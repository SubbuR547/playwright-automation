name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test tests/hard-assertions.spec.ts tests/soft-assertions.spec.ts tests/negative-assertions.spec.ts tests/numeric-assertions.spec.ts tests/polling-assertions.spec.ts tests/custom-messages.spec.ts tests/full-reference.spec.ts tests/api-testing.spec.ts tests/crud-api.spec.ts tests/hybrid-testing.spec.ts tests/parallel-sharding.spec.ts tests/multi-tab.spec.ts tests/multi-user.spec.ts
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7